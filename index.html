<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will It Ship? - AI Estimate Validator</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="./script.js"></script>
    <link rel="stylesheet" href="./output.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .gradient-mesh {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(70px);
            opacity: 0;
            animation: orbFadeIn 3s ease-out forwards;
        }

        .gradient-orb-wrapper {
            position: absolute;
            animation: orbFloat 25s ease-in-out infinite;
        }

        @keyframes orbFadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 0.7;
            }
        }

        .gradient-orb-1 {
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.8) 0%, transparent 70%);
            top: -200px;
            left: -100px;
            animation-delay: 0s, 0s;
        }

        @keyframes orbFloat {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            12.5% {
                transform: translate(300px, -200px) scale(0.85);
            }
            25% {
                transform: translate(150px, -100px) scale(0.7);
            }
            37.5% {
                transform: translate(-200px, 300px) scale(0.85);
            }
            50% {
                transform: translate(-300px, 400px) scale(1);
            }
            62.5% {
                transform: translate(-200px, 300px) scale(0.85);
            }
            75% {
                transform: translate(200px, 200px) scale(0.7);
            }
            87.5% {
                transform: translate(250px, 250px) scale(0.85);
            }
        }

        .glow-indigo {
            box-shadow: 0 0 60px rgba(99, 102, 241, 0.15);
        }
    </style>
</head>

<body class="bg-gray-950 min-h-screen py-12 px-4 relative">
    <div class="gradient-mesh">
        <div class="gradient-orb-wrapper">
            <div class="gradient-orb gradient-orb-1"></div>
        </div>
    </div>
    <div class="max-w-2xl mx-auto relative z-10"
        x-data="{ description: '', estimate: '', unit: 'day', result: '', loading: false, errors: {}, validateForm() { this.errors = {}; if (!this.description.trim() || this.description.length < 10) { this.errors.description = 'Please provide at least 10 characters describing your project'; } if (!this.estimate || isNaN(parseFloat(this.estimate)) || parseFloat(this.estimate) <= 0) { this.errors.estimate = 'Enter a valid number greater than 0'; } return Object.keys(this.errors).length === 0; } }">

        <div class="text-center mb-8">
            <div
                class="inline-flex items-center gap-2 bg-gradient-to-r from-indigo-500/10 to-purple-500/10 backdrop-blur-sm border border-indigo-500/20 rounded-full px-4 py-1.5 mb-6">
                <span class="relative flex h-3 w-3">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-indigo-500"></span>
                </span>
                <span class="text-base text-indigo-300 font-medium">AI-Powered Analysis</span>
            </div>
            <h1 class="text-6xl font-bold text-white mb-4 tracking-tight">Will It Ship?</h1>
            <p class="text-gray-400 text-lg max-w-lg mx-auto">Get an instant reality check on your project estimates.
            </p>
            <p class="text-gray-400 text-lg max-w-md mx-auto">Validated against 500,000+ real-world industry benchmarks.
            </p>
        </div>

        <div class="bg-gray-900/60 backdrop-blur-2xl rounded-3xl border border-gray-800 p-1 glow-indigo">
            <div class="bg-gradient-to-b from-gray-950/80 to-gray-950/50 rounded-2xl p-6 sm:p-8">
                <form x-on:submit="
                    $event.preventDefault();
                    if (!validateForm()) return;
                    loading = true;
                    setTimeout(() => {
                        let hash = hashCode(description+estimate+unit);
                        console.log(hash);
                        result = estimateResponses[hash%estimateResponses.length];
                        loading = false;
                    }, 1000);
                ">
                    <div class="space-y-6">
                        <div>
                            <label for="description"
                                class="block text-xs font-semibold text-gray-300 uppercase tracking-wider mb-2.5">
                                What are you building?
                            </label>
                            <div class="relative">
                                <textarea id="description" x-model="description"
                                    placeholder="I am building Checkout API from scratch..."
                                    rows="3"
                                    :class="errors.description ? 'border-red-400 focus:ring-red-400/50 focus:border-red-400' : 'border-gray-600 focus:ring-indigo-500/50 focus:border-indigo-500'"
                                    class="w-full px-4 py-3.5 bg-gray-900/50 border rounded-xl focus:outline-none resize-none placeholder:text-gray-500 text-white transition-all pr-10"></textarea>
                                <div class="absolute right-3 top-3 text-gray-500">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                    </svg>
                                </div>
                            </div>
                            <p x-show="errors.description" x-transition
                                class="mt-2 text-red-400 text-sm flex items-center gap-1.5">
                                <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd"
                                        d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                                        clip-rule="evenodd" />
                                </svg>
                                <span x-text="errors.description"></span>
                            </p>
                        </div>

                        <div class="grid grid-cols-3 gap-4">
                            <div class="col-span-1">
                                <label for="estimate"
                                    class="block text-xs font-semibold text-gray-300 uppercase tracking-wider mb-2.5">
                                    Estimate
                                </label>
                                <div class="relative">
                                    <input type="number" id="estimate" x-model="estimate" placeholder="2" min="0"
                                        step="0.1"
                                        :class="errors.estimate ? 'border-red-400 focus:ring-red-400/50 focus:border-red-400' : 'border-gray-600 focus:ring-indigo-500/50 focus:border-indigo-500'"
                                        class="w-full px-4 py-3.5 bg-gray-900/50 border rounded-xl focus:outline-none placeholder:text-gray-500 text-white text-center transition-all" />
                                </div>
                                <p x-show="errors.estimate" x-transition
                                    class="mt-2 text-red-400 text-sm flex items-center gap-1.5">
                                    <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                                        <path fill-rule="evenodd"
                                            d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                                            clip-rule="evenodd" />
                                    </svg>
                                    <span x-text="errors.estimate"></span>
                                </p>
                            </div>
                            <div class="col-span-2">
                                <label for="unit"
                                    class="block text-xs font-semibold text-gray-300 uppercase tracking-wider mb-2.5">
                                    Time Unit
                                </label>
                                <div class="relative">
                                    <select id="unit" x-model="unit"
                                        class="w-full px-4 py-3.5 bg-gray-900/50 border border-gray-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 text-white cursor-pointer transition-all appearance-none [&>option]:bg-gray-900 pr-10">
                                        <option value="day">Days</option>
                                        <option value="week">Weeks</option>
                                        <option value="month">Months</option>
                                        <option value="year">Years</option>
                                    </select>
                                    <div
                                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M19 9l-7 7-7-7" />
                                        </svg>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <button type="submit" :disabled="loading"
                            class="w-full py-4 px-6 bg-gradient-to-r from-indigo-600 via-purple-600 to-indigo-600 text-white font-semibold rounded-xl hover:from-indigo-500 hover:via-purple-500 hover:to-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-gray-950 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2.5 transition-all shadow-lg shadow-indigo-500/25 hover:shadow-indigo-500/40 cursor-pointer bg-[length:200%_100%] animate-gradient">
                            <svg x-show="loading" class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg"
                                fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4">
                                </circle>
                                <path class="opacity-75" fill="currentColor"
                                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                </path>
                            </svg>
                            <span x-text="loading ? 'Analyzing...' : 'Get Reality Check'"></span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div x-show="!loading && result" x-transition class="mt-8">
            <div
                class="bg-gradient-to-br from-amber-500/10 to-orange-500/10 backdrop-blur-xl rounded-2xl border border-amber-500/20 p-6 sm:p-8 glow-indigo">
                <div class="flex items-start gap-4">
                    <div
                        class="flex-shrink-0 w-10 h-10 bg-gradient-to-br from-amber-500 to-orange-500 rounded-xl flex items-center justify-center shadow-lg shadow-amber-500/30">
                        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd"
                                d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"
                                clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-xs font-semibold text-amber-400 uppercase tracking-wider mb-2.5">AI Analysis
                            Result</h3>
                        <p class="text-white leading-relaxed" x-text="result"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-12 text-center">
            <p class="text-sm text-gray-500">Made with ❤️ for chronically optimistic developers</p>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const orb = document.querySelector('.gradient-orb');
            const wrapper = document.querySelector('.gradient-orb-wrapper');
            
            if (orb && wrapper) {
                const randomDelay = -(Math.random() * 25);
                const randomFadeDelay = -(Math.random() * 2);
                wrapper.style.animationDelay = `${randomDelay}s`;
                orb.style.animationDelay = `${randomFadeDelay}s`;

                let mouseX = 0;
                let mouseY = 0;
                let orbX = 0;
                let orbY = 0;
                const repelDistance = 250;
                const repelStrength = 0.5;

                document.addEventListener('mousemove', (e) => {
                    mouseX = e.clientX;
                    mouseY = e.clientY;
                });

                function updateOrbPosition() {
                    const orbRect = orb.getBoundingClientRect();
                    const orbCenterX = orbRect.left + orbRect.width / 2;
                    const orbCenterY = orbRect.top + orbRect.height / 2;

                    const dx = orbCenterX - mouseX;
                    const dy = orbCenterY - mouseY;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < repelDistance) {
                        const force = (repelDistance - distance) / repelDistance;
                        orbX += dx * force * repelStrength;
                        orbY += dy * force * repelStrength;
                    } else {
                        orbX *= 0.92;
                        orbY *= 0.92;
                    }

                    orbX = Math.max(-150, Math.min(150, orbX));
                    orbY = Math.max(-150, Math.min(150, orbY));

                    orb.style.transform = `translate(${orbX}px, ${orbY}px)`;
                    requestAnimationFrame(updateOrbPosition);
                }

                updateOrbPosition();
            }
        });
    </script>
</body>

</html>
