<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will It Ship? - AI Estimate Validator</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="./script.js"></script>
    <link rel="stylesheet" href="./output.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .gradient-mesh {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .gradient-mesh::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(59, 130, 246, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 60% 40%, rgba(139, 92, 246, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 30% 30%, rgba(14, 165, 233, 0.2) 0%, transparent 40%);
            filter: blur(60px);
            animation: meshMove 20s ease-in-out infinite;
        }

        @keyframes meshMove {
            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }
            33% {
                transform: translate(2%, 2%) rotate(2deg);
            }
            66% {
                transform: translate(-1%, 1%) rotate(-1deg);
            }
        }
    </style>
</head>

<body class="bg-gray-950 min-h-screen py-12 px-4 relative">
    <div class="gradient-mesh"></div>
    <div class="max-w-xl mx-auto relative z-10"
        x-data="{ description: '', estimate: '', unit: 'day', result: '', loading: false, errors: {}, validateForm() { this.errors = {}; if (!this.description.trim() || this.description.length < 20) { this.errors.description = 'Please provide at least 20 characters describing your project'; } if (!this.estimate || isNaN(parseFloat(this.estimate)) || parseFloat(this.estimate) <= 0) { this.errors.estimate = 'Enter a valid number greater than 0'; } return Object.keys(this.errors).length === 0; } }">
        <div class="text-center mb-10">
            <div
                class="inline-flex items-center gap-2 bg-indigo-500/10 backdrop-blur-sm border border-indigo-500/20 rounded-full px-4 py-1.5 mb-6">
                <span class="relative flex h-2 w-2">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span>
                </span>
                <span class="text-sm text-indigo-300 font-medium">AI-Powered Analysis</span>
            </div>
            <h1 class="text-4xl font-bold text-white mb-3 tracking-tight">Will It Ship?</h1>
            <p class="text-gray-400 text-base max-w-md mx-auto">Get instant, brutally honest feedback on your project
                timeline estimates</p>
        </div>

        <div class="bg-gray-900/60 backdrop-blur-2xl rounded-2xl border border-gray-800 p-1">
            <div class="bg-gray-950/50 rounded-xl p-6 sm:p-8">
                <form x-on:submit="
                    $event.preventDefault();
                    if (!validateForm()) return;
                    loading = true;
                    setTimeout(() => {
                        let hash = hashCode(description+estimate+unit);
                        console.log(hash);
                        result = estimateResponses[hash%estimateResponses.length];
                        loading = false;
                    }, 1000);
                ">
                    <div class="space-y-5">
                        <div>
                            <label for="description"
                                class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">
                                Project Summary
                            </label>
                            <textarea id="description" x-model="description"
                                placeholder="Describe what you're building - features, scope, technical requirements..."
                                rows="3"
                                :class="errors.description ? 'border-red-400 focus:ring-red-400/50 focus:border-red-400' : 'border-gray-700 focus:ring-indigo-500/50 focus:border-indigo-500'"
                                class="w-full px-4 py-3 bg-gray-900 border rounded-xl focus:outline-none resize-none placeholder:text-gray-600 text-gray-200 transition-all"></textarea>
                            <p x-show="errors.description" x-transition
                                class="mt-1.5 text-red-400 text-sm flex items-center gap-1.5">
                                <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd"
                                        d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                                        clip-rule="evenodd" />
                                </svg>
                                <span x-text="errors.description"></span>
                            </p>
                        </div>

                        <div class="grid grid-cols-3 gap-4">
                            <div class="col-span-1">
                                <label for="estimate"
                                    class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">
                                    Estimate
                                </label>
                                <input type="number" id="estimate" x-model="estimate" placeholder="2" min="0" step="0.1"
                                    :class="errors.estimate ? 'border-red-400 focus:ring-red-400/50 focus:border-red-400' : 'border-gray-700 focus:ring-indigo-500/50 focus:border-indigo-500'"
                                    class="w-full px-4 py-3 bg-gray-900 border rounded-xl focus:outline-none placeholder:text-gray-600 text-gray-200 text-center transition-all" />
                                <p x-show="errors.estimate" x-transition
                                    class="mt-1.5 text-red-400 text-sm flex items-center gap-1.5">
                                    <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                                        <path fill-rule="evenodd"
                                            d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                                            clip-rule="evenodd" />
                                    </svg>
                                    <span x-text="errors.estimate"></span>
                                </p>
                            </div>
                            <div class="col-span-2">
                                <label for="unit"
                                    class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">
                                    Time Unit
                                </label>
                                <select id="unit" x-model="unit"
                                    class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 text-gray-200 cursor-pointer transition-all [&>option]:bg-gray-900">
                                    <option value="day">Days</option>
                                    <option value="week">Weeks</option>
                                    <option value="month">Months</option>
                                    <option value="year">Years</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" :disabled="loading"
                            class="w-full py-3.5 px-6 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold rounded-xl hover:from-indigo-500 hover:to-purple-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-gray-950 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2.5 transition-all shadow-lg shadow-indigo-500/25 hover:shadow-indigo-500/40 cursor-pointer">
                            <svg x-show="loading" class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg"
                                fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4">
                                </circle>
                                <path class="opacity-75" fill="currentColor"
                                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                </path>
                            </svg>
                            <span x-text="loading ? 'Analyzing...' : 'Get Reality Check'"></span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div x-show="!loading && result" x-transition class="mt-8">
            <div
                class="bg-gradient-to-br from-amber-500/10 to-orange-500/10 backdrop-blur-xl rounded-2xl border border-amber-500/20 p-4 sm:p-8">
                <div class="flex items-start gap-4">
                    <div class="flex-shrink-0 w-8 h-8 bg-amber-500/20 rounded-xl flex items-center justify-center">
                        <svg class="w-5 h-5 text-amber-400" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd"
                                d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"
                                clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-xs font-semibold text-amber-400 uppercase tracking-wider mb-2">AI Analysis
                            Result</h3>
                        <p class="text-gray-300 leading-relaxed text-base" x-text="result"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-12 text-center">
            <p class="text-sm text-gray-200">Made with ❤️ for chronically optimistic people</p>
        </div>
    </div>
</body>

</html>
